<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Meu Custo Real</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ========================= -->
  <!-- TOPO DO SITE -->
  <!-- ========================= -->

  <header class="topo">

    <div class="logoArea">
      <img
        src="assets/images/logo.png"
        alt="Logo Meu Custo Real"
        class="logoImagem">
    </div>

    <nav id="menuCategorias" class="menuCategorias">
      <!-- Categorias geradas pelo JS -->
    </nav>

    <div class="loginArea">
      <button class="botaoLogin">Login</button>
    </div>

  </header>

  <!-- ========================= -->
  <!-- BUSCA DE PRODUTOS -->
  <!-- ========================= -->

  <section class="areaBusca">

    <input
      type="search"
      id="busca"
      name="busca-produto"
      placeholder="Buscar produto..."
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      onkeyup="buscarProduto()">

  </section>

  <!-- ========================= -->
  <!-- CONTEÚDO PRINCIPAL -->
  <!-- ========================= -->

  <main class="conteudo">

    <!-- GRID DE PRODUTOS -->

    <section
      id="gridProdutos"
      class="gridProdutos">

      <!-- Produtos gerados via JS -->

    </section>


    <!-- ========================= -->
    <!-- CESTA DA RECEITA -->
    <!-- ========================= -->

    <aside class="cesta">

      <h2>Cesta da Receita</h2>

      <div id="listaCesta">
        <!-- itens adicionados aparecem aqui -->
      </div>

      <div class="totalCesta">

        <strong>Total:</strong>

        <span id="totalReceita">
          R$ 0.00
        </span>

      </div>

      <!-- CONFIGURAÇÕES -->

      <div class="configCesta">

        <label for="margemLucro">
          Margem de Lucro (%)
        </label>

        <input
          type="number"
          id="margemLucro"
          placeholder="Ex: 20">

        <label for="taxaPlataforma">
          Taxa da Plataforma (%)
        </label>

        <input
          type="number"
          id="taxaPlataforma"
          placeholder="Ex: 10 (iFood, 99...)">

      </div>

    </aside>

  </main>

  <!-- ========================= -->
  <!-- CALCULADORA DE PRODUTO -->
  <!-- ========================= -->

  <div
    id="painelCalculadora"
    class="painelCalculadora">

    <button
      class="fecharCalculadora"
      onclick="fecharCalculadora()">

      ✕

    </button>

    <h2 id="nomeProduto">
      Produto
    </h2>

    <!-- PREÇO -->

    <label for="preco">
      Preço do produto
    </label>

    <input
      type="text"
      id="preco"
      placeholder="R$ 0,00"
      onkeyup="mascaraDinheiro(this); calcular();">

    <!-- PESO COMPRADO -->

    <label for="pesoComprado">
      Peso comprado
    </label>

    <input
      type="text"
      id="pesoComprado"
      placeholder="ex: 1kg ou 1000g"
      oninput="calcular()">

    <small>

      Aceita unidades:

      <br>

      g, kg, ml, l

      <br>

      Exemplo:
      1kg
      •
      500g
      •
      1l
      •
      250ml

    </small>

    <!-- PESO USADO -->

    <label for="pesoUsado">
      Quantidade usada na receita
    </label>

    <input
      type="text"
      id="pesoUsado"
      placeholder="ex: 200g"
      oninput="calcular()">

    <!-- RESULTADO -->

    <h3 id="resultado">
      R$ 0.00
    </h3>

    <!-- BOTÕES -->

    <div class="botoesCalculadora">

      <button onclick="adicionarCesta()">
        Adicionar à cesta
      </button>

      <button onclick="limparCalculadora()">
        Limpar
      </button>

    </div>

  </div>

  <!-- ========================= -->
  <!-- SCRIPT -->
  <!-- ========================= -->

  <script src="script.js"></script>

</body>
</html>
